name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build and upload (e.g. v5.0.7)"
        required: true

jobs:
  # ── Cross-platform tests must pass before publishing ──────────────
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest         # x86_64 Linux
            python: "3.11"
          - os: macos-latest          # Apple Silicon (ARM64)
            python: "3.11"
          - os: macos-15              # macOS Sequoia (ARM64)
            python: "3.11"

    runs-on: ${{ matrix.os }}
    name: "test / ${{ matrix.os }}"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install test dependencies
        run: pip install pytest pytest-cov pytest-mock scikit-learn numpy joblib

      - name: Run tests (non-QGIS)
        run: |
          pytest tests/ -k "not qgis" --disable-warnings -o "addopts=" -v \
            --tb=short --no-header -q

  # ── Build & attach plugin zip only after all tests pass ───────────
  release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Get version from metadata.txt
        id: version
        run: |
          VERSION=$(grep -m1 '^version=' metadata.txt | cut -d= -f2 | tr -d '[:space:]')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build plugin zip
        run: python zip_file.py --output dzetsaka_${{ steps.version.outputs.version }}.zip --skip-resource-check

      - name: Upload zip to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.event.release.tag_name || inputs.tag || github.ref_name }}"
          gh release upload "$TAG" \
            "dzetsaka_${{ steps.version.outputs.version }}.zip" \
            --clobber
