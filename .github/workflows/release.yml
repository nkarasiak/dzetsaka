name: Release

on:
  release:
    types: [published]

jobs:
  build-and-attach:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Get version from metadata.txt
        id: version
        run: |
          VERSION=$(grep -m1 '^version=' metadata.txt | cut -d= -f2 | tr -d '[:space:]')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build plugin zip
        run: python zip_file.py --output dzetsaka_${{ steps.version.outputs.version }}.zip --skip-resource-check

      - name: Upload zip to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            "dzetsaka_${{ steps.version.outputs.version }}.zip" \
            --clobber
