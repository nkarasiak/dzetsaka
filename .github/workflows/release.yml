name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build and upload (e.g. v5.0.7)"
        required: true

jobs:
  build-and-attach:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Get version from metadata.txt
        id: version
        run: |
          VERSION=$(grep -m1 '^version=' metadata.txt | cut -d= -f2 | tr -d '[:space:]')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build plugin zip
        run: python zip_file.py --output dzetsaka_${{ steps.version.outputs.version }}.zip --skip-resource-check

      - name: Upload zip to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.event.release.tag_name || inputs.tag }}"
          gh release upload "$TAG" \
            "dzetsaka_${{ steps.version.outputs.version }}.zip" \
            --clobber
